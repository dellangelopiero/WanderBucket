<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Bucket List</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Travel Bucket Wishes List</h1>

    <div id="search-container">
        <input type="text" id="search" placeholder="Type countries here...">
        <button id="search-btn">Search</button>
    </div>

    <h2>Countries</h2>
    <div id="countries"></div>

    <h2>Bucket List</h2>
    <div id="bucket"></div>

    <button id="clear-btn">Clear Bucket List</button>

</body>

</html>
